name: Build Gemu Edition APK

# This lets you trigger the build manually by pressing a button!
on: 
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab the code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Setup Node.js (React Native needs this)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. Setup Java (Android needs this)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. Install dependencies
      - name: Install Packages
        run: npm install

      # 5. Build the actual APK!
      - name: Build Android Release
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      # 6. Upload the APK so you can download it to your phone
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: ChatterUI-Gemu-Edition
          path: android/app/build/outputs/apk/release/app-release.apk
